<!DOCTYPE html>
<html>
<head>
  <title>GeoSafe AI</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
  }

  /* INPUT BAR */
  .input-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    width: 180px;
    font-size: 16px;
  }

  button {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #00c6ff;
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    background: #0072ff;
  }

  /* MAIN GRID */
  .main {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 25px;
    padding: 20px;
  }

  /* CARD */
  .card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    font-size: 16px;
    line-height: 1.6;
  }

  .card h3 {
    font-size: 20px;
    margin-bottom: 15px;
  }

  /* MAP */
  #map {
    height: 75vh;
    border-radius: 15px;
  }

  /* RISK COLORS */
  .low {
    background: #28a745;
    padding: 6px 12px;
    border-radius: 8px;
  }

  .medium {
    background: #ffc107;
    color: black;
    padding: 6px 12px;
    border-radius: 8px;
  }

  .high {
    background: #dc3545;
    padding: 6px 12px;
    border-radius: 8px;
  }

  .label {
    font-weight: bold;
  }

  /* MOBILE FIX */
  @media (max-width: 768px) {
    .main {
      grid-template-columns: 1fr;
    }

    #map {
      height: 400px;
    }
  }
</style>
</head>

<body>

<div class="header">
  🌍 GeoSafe AI - Smart Land Analyzer
</div>

<div class="input-bar">
  <input id="lat" placeholder="Latitude">
  <input id="lon" placeholder="Longitude">
  <button onclick="checkLand()">Check</button>
</div>

<div class="main">

  <!-- RESULT -->
  <div id="result" class="card">
    <p>Enter coordinates to analyze land...</p>
  </div>

  <!-- MAP -->
  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
