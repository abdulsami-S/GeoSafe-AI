<!DOCTYPE html>
<html>

<head>
  <title>GeoSafe AI</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 18px;
      font-size: 26px;
      font-weight: 600;
    }

    /* INPUT BAR */
    .input-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    /* Map Container Style Reset */
    .leaflet-container {
      background: #ddd;
    }
    

    input,
    select {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(5px);
      color: white;
      width: 180px;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.8);
    }

    input:focus,
    select:focus {
      border-color: white;
      background: rgba(255, 255, 255, 0.2);
    }

    select option {
      background: #1e3c72;
      color: white;
    }

    button {
      padding: 12px 24px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(5px);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: white;
      transform: scale(1.05);
    }
    
    button:active {
      transform: scale(0.95);
    }

    /* LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 25px;
      padding: 20px;
      height: 85vh;
    }

    /* RESULT PANEL */
    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 30px;
      font-size: 18px;
    }

    .card h3 {
      font-size: 26px;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .card p {
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .label {
      font-weight: 600;
      color: #00c6ff;
    }

    /* SECTION STYLE */
    .section {
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .value {
      font-size: 16px;
      line-height: 1.6;
    }

    /* RISK BADGES */
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
    }

    .low {
      background: #28a745;
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: bold;
    }

    .medium {
      background: #ffc107;
      color: black;
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: bold;
    }

    .high {
      background: #dc3545;
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: bold;
    }

    /* MAP */
    #map {
      height: 100%;
      border-radius: 12px;
    }

    /* No CSS hacks for tiles, using JS override instead */

    /* CUSTOM LEAFLET POPUPS & TOOLTIPS (THEME MATCH) */
    .leaflet-popup-content-wrapper, .leaflet-tooltip {
      background: #1e3c72 !important;
      color: white !important;
      border: 1px solid #00c6ff !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important;
    }

    .leaflet-popup-tip {
      background: #1e3c72 !important;
    }

    .leaflet-popup-content {
      font-size: 15px;
      font-family: 'Segoe UI', sans-serif;
      line-height: 1.5;
    }

    .leaflet-container a.leaflet-popup-close-button {
      color: #00c6ff !important;
      font-size: 18px;
    }
    
    .leaflet-container a.leaflet-popup-close-button:hover {
      color: white !important;
    }

    /* MOBILE */
    @media(max-width:768px) {
      .main {
        grid-template-columns: 1fr;
        height: auto;
      }

      #map {
        height: 400px;
      }
    }
  </style>
</head>

<body>

  <div class="header">GeoSafe AI - Land Intelligence System</div>

  <div class="input-bar">
    <input id="lat" placeholder="Latitude">
    <input id="lon" placeholder="Longitude">

    <select id="purpose">
      <option value="" disabled selected>Purpose</option>
      <option value="general">General</option>
      <option value="residential">Residential</option>
      <option value="industrial">Industrial</option>
      <option value="farming">Farming</option>
    </select>

    <button onclick="checkLand()">Analyze</button>
  </div>

  <div class="main">

    <div class="card" id="result">
      System ready. Enter coordinates to analyze land.
    </div>

    <div id="map"></div>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>

</body>

</html>
