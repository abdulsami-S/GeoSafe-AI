<!DOCTYPE html>
<html>
<head>
  <title>GeoSafe AI</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      font-size: 19px;
    }

    .header {
      text-align: center;
      padding: 20px;
      font-size: 30px;
      font-weight: bold;
    }

    .input-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input {
      padding: 14px;
      border-radius: 8px;
      border: none;
      width: 200px;
      font-size: 20px;
    }

    button {
      padding: 14px 30px;
      border: none;
      border-radius: 8px;
      background: #00c6ff;
      color: white;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #0072ff;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 25px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      font-size: 25px;
      line-height: 1.8;
    }

    .card h3 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .label {
      font-weight: bold;
      font-size: 27px;
    }

    .low {
      background: #28a745;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 19px;
    }

    .medium {
      background: #ffc107;
      color: black;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 19px;
    }

    .high {
      background: #dc3545;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 19px;
    }

    #map {
      height: 80vh;
      border-radius: 15px;
    }

    @media (max-width: 768px) {
      body{
        font-size: 16px;
      }

      .main {
        grid-template-columns: 1fr;
      }

      #map {
        height: 400px;
      }
    }
  </style>
</head>

<body>

<div class="header">🌍 GeoSafe AI - Smart Land Analyzer</div>

<div class="input-bar">
  <input id="lat" placeholder="Latitude">
  <input id="lon" placeholder="Longitude">
  <button onclick="checkLand()">Check</button>
</div>

<div class="main">
  <div class="card" id="result">
    📊 Enter coordinates to analyze...
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
